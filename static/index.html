<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chatbot</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #1e2a4a;
    --border: #2a3a5e;
    --text: #e0e0e0;
    --text-dim: #8899bb;
    --accent: #4fc3f7;
    --accent2: #7c4dff;
    --user-bg: #0d47a1;
    --assistant-bg: #1e2a4a;
    --source-bg: #0a1628;
    --error: #ff5252;
    --green: #69f0ae;
    --radius: 12px;
    --max-w: 800px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    display: inline-block;
  }
  .status-dot.off { background: var(--error); }
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    scroll-behavior: smooth;
  }
  .messages {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
  }
  .message.user {
    align-self: flex-end;
  }
  .message.assistant {
    align-self: flex-start;
  }
  .message .bubble {
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .message.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .message.assistant .bubble {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .message.assistant .bubble p { margin: 0 0 8px; }
  .message.assistant .bubble p:last-child { margin: 0; }
  .message.assistant .bubble ul, .message.assistant .bubble ol { margin: 4px 0 8px 20px; }
  .message.assistant .bubble code {
    background: var(--source-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .message.assistant .bubble pre code {
    display: block;
    padding: 12px;
    overflow-x: auto;
  }
  .message .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    padding: 0 4px;
  }
  .source-tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--source-bg);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }
  .source-tag:hover {
    background: var(--surface2);
    color: var(--accent);
    border-color: var(--accent);
  }
  .source-tag .score {
    color: var(--green);
    font-weight: 500;
  }
  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .welcome h2 {
    font-size: 24px;
    margin-bottom: 12px;
    color: var(--text);
  }
  .welcome p { font-size: 14px; line-height: 1.6; }
  .welcome .icon { font-size: 48px; margin-bottom: 16px; }
  .input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-row {
    max-width: var(--max-w);
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  .input-row textarea {
    flex: 1;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 160px;
    transition: border-color 0.2s;
  }
  .input-row textarea:focus {
    border-color: var(--accent);
  }
  .input-row textarea::placeholder {
    color: var(--text-dim);
  }
  .input-row button {
    padding: 12px 24px;
    border-radius: var(--radius);
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .input-row button:hover { opacity: 0.9; }
  .input-row button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .input-row button.loading {
    position: relative;
    overflow: hidden;
  }
  .loading-dots::after {
    content: '...';
    animation: dots 1.2s steps(3) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
  .typing {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  .footer {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    padding: 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  /* Scrollbar */
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .chat-container { padding: 16px; }
    .message { max-width: 95%; }
    .input-area { padding: 12px 16px; }
    .input-row textarea { font-size: 16px; } /* prevent iOS zoom */
  }
</style>
</head>
<body>

<div class="header">
  <h1>RAG Chatbot</h1>
  <div class="status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">connecting...</span>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="icon">🧠</div>
      <h2>Chat with your vault</h2>
      <p>Ask anything from your Obsidian second brain.<br>Answers are grounded in your notes and synthesized by DeepSeek.</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask your vault anything..." autofocus></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<div class="footer" id="footer">rag-chatbot</div>

<script>
const SESSION_ID = 'default';
let isLoading = false;

const chatContainer = document.getElementById('chatContainer');
const messages = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// ── Auto-resize textarea ────────────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

// ── Health check ────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res = await fetch('/api/health');
    const data = await res.json();
    if (data.status === 'ok') {
      statusDot.className = 'status-dot';
      statusText.textContent = `vault ready · ${data.model}`;
    }
  } catch {
    statusDot.className = 'status-dot off';
    statusText.textContent = 'server offline';
  }
}
checkHealth();
setInterval(checkHealth, 15000);

// ── Send message ────────────────────────────────────────────────────
async function send() {
  const text = input.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  input.disabled = true;
  sendBtn.disabled = true;
  sendBtn.textContent = 'Sending';
  sendBtn.classList.add('loading');
  welcome?.remove();

  // Add user message
  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Add placeholder for assistant
  const assistantMsg = addMessage('assistant', '', true);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: SESSION_ID }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      assistantMsg.querySelector('.bubble').textContent = `Error: ${err.error || res.statusText}`;
      assistantMsg.querySelector('.typing')?.remove();
      finish();
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullContent = '';
    let sources = [];
    let sourceAdded = false;
    const bubbleEl = assistantMsg.querySelector('.bubble');
    const typingEl = assistantMsg.querySelector('.typing');

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') continue;

        try {
          const data = JSON.parse(payload);

          if (data.type === 'metadata') {
            sources = data.data.rag_results || [];
            continue;
          }

          if (data.content) {
            fullContent += data.content;
            typingEl?.remove();

            // Check for source citations
            const sourceMatch = fullContent.match(/\[Source (\d+)\]/g);
            if (sourceMatch && !sourceAdded) {
              sourceAdded = true;
            }

            renderMarkdown(bubbleEl, fullContent);
            scrollToBottom();
          }

          if (data.error) {
            bubbleEl.textContent = `Error: ${data.error}`;
            finish();
            return;
          }
        } catch {}
      }
    }

    // Add source tags
    if (sources.length > 0) {
      const sourcesDiv = document.createElement('div');
      sourcesDiv.className = 'sources';
      sources.forEach((s, i) => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        const path = s.path || 'unknown';
        const score = s.score || 0;
        tag.title = `Score: ${score.toFixed(2)}\n${s.snippet || path}`;
        tag.innerHTML = `Source ${i+1}: <span class="score">${(score * 100).toFixed(0)}%</span> · ${path.split('/').pop()}`;
        sourcesDiv.appendChild(tag);
      });
      assistantMsg.appendChild(sourcesDiv);
    }

    // Render final content
    if (fullContent) {
      renderMarkdown(bubbleEl, fullContent);
    }

  } catch (err) {
    const bubble = assistantMsg.querySelector('.bubble');
    bubble.textContent = `Connection error: ${err.message}`;
    assistantMsg.querySelector('.typing')?.remove();
  }

  finish();
}

function finish() {
  isLoading = false;
  input.disabled = false;
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
  sendBtn.classList.remove('loading');
  input.focus();
  scrollToBottom();
}

// ── Message rendering ───────────────────────────────────────────────
function addMessage(role, content, isLoadingPlaceholder = false) {
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (role === 'assistant' && !content) {
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  } else if (content) {
    if (role === 'user') {
      bubble.textContent = content;
    }
  }

  div.appendChild(bubble);
  messages.appendChild(div);
  scrollToBottom();
  return div;
}

function renderMarkdown(el, md) {
  // Simple Markdown rendering (no deps)
  let html = md
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    // Headings
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    // Lists
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    // Line breaks
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');

  html = '<p>' + html + '</p>';
  el.innerHTML = html;
}

function scrollToBottom() {
  chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>
</body>
</html>
